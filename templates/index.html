<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1">

<title>My AI</title>

<style>

body{
margin:0;
background:#0f0f0f;
color:white;
font-family:sans-serif;
display:flex;
flex-direction:column;
height:100vh;
}

#chat{
flex:1;
overflow-y:auto;
padding:20px;
}

.message{
max-width:85%;
padding:14px;
border-radius:16px;
margin-bottom:14px;
line-height:1.8;
white-space:pre-wrap;
}

.user{
background:#2563eb;
margin-left:auto;
}

.ai{
background:#222;
}

#bottom{
display:flex;
padding:10px;
background:#111;
}

input{
flex:1;
padding:14px;
border:none;
border-radius:12px;
background:#222;
color:white;
font-size:16px;
}

button{
margin-left:10px;
border:none;
border-radius:12px;
padding:14px 18px;
background:#10b981;
color:white;
font-weight:bold;
}

.typing{
opacity:0.6;
}

</style>

</head>

<body>

<div id="chat"></div>

<div id="bottom">

<input
id="prompt"
placeholder="پیام بنویس..."
autocomplete="off">

<button onclick="sendMessage()">
ارسال
</button>

</div>

<script>

const chat =
document.getElementById("chat")

function addMessage(text,type){

const div =
document.createElement("div")

div.className =
"message " + type

div.innerText = text

chat.appendChild(div)

chat.scrollTop =
chat.scrollHeight
}

async function sendMessage(){

const input =
document.getElementById("prompt")

const text =
input.value.trim()

if(!text) return

addMessage(text,"user")

input.value = ""

const loading =
document.createElement("div")

loading.className =
"message ai typing"

loading.innerText =
"درحال فکر کردن..."

chat.appendChild(loading)

chat.scrollTop =
chat.scrollHeight

try{

const response =
await fetch(
"http://127.0.0.1:8080/completion",
{

method:"POST",

headers:{
"Content-Type":
"application/json"
},

body:JSON.stringify({

prompt:
`<|im_start|>system
تو یک دستیار فارسی روان، طبیعی و دوستانه هستی.
فقط فارسی صحبت کن.
کوتاه و واضح جواب بده.
<|im_end|>

<|im_start|>user
${text}
<|im_end|>

<|im_start|>assistant
`,

n_predict:128,

temperature:0.7,

stop:[
"<|im_end|>",
"<|im_start|>"
]

})

})

const data =
await response.json()

loading.remove()

addMessage(
data.content,
"ai"
)

}catch(err){

loading.remove()

addMessage(
"خطا در اتصال به مدل",
"ai"
)

console.log(err)
}
}

</script>

</body>

</html>
